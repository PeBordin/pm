<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Full Screen Fit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ส่วนควบคุมการขยายร่าง */
        .airvisual-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 280px; /* ขนาดตั้งต้นของ Widget */
            height: 400px; /* ความสูงโดยประมาณของ Widget */
            
            /* ใช้ฟังก์ชันขยายตามความกว้างหน้าจอ (Viewport Width) */
            /* เลข 280 คือขนาดความกว้างเดิมของ Widget ถ้าหารแล้วจะได้สัดส่วนที่พอดีจอ */
            transform: scale(calc(100vw / 280)); 
            
            /* หากจอเป็นแนวตั้งและมันล้น ให้ใช้ตัวเลือกนี้แทน (เลือกอย่างใดอย่างหนึ่ง) */
            /* transform: scale(calc(100vh / 450)); */
            
            transform-origin: center center;
        }

        /* บังคับให้ Widget ข้างในไม่ตัดขอบ */
        [name="airvisual_widget"] {
            min-width: 280px !important;
        }
    </style>
</head>
<body>

    <div class="airvisual-wrapper">
        <div name="airvisual_widget" key="698d4915a59890a8eae563e2"></div>
    </div>

    <script type="text/javascript" src="https://widget.iqair.com/script/widget_v3.0.js"></script>

</body>
</html>
